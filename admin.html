<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeerTea Admin</title>
<style>
  :root {
    --bg: #f5f0e8;
    --panel: #ffffff;
    --ink: #1e2e1a;
    --muted: #6b7c65;
    --line: #d9cfbf;
    --accent: #2d4a2d;
    --accent-2: #c9952a;
    --danger: #a33d2c;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #ede6d6 0%, #f5f0e8 100%);
    color: var(--ink);
  }
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px 56px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .topbar a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 14px 34px rgba(45, 74, 45, 0.08);
  }
  h1, h2, h3, p { margin-top: 0; }
  .muted { color: var(--muted); }
  label {
    display: block;
    margin: 12px 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  input, textarea, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    font: inherit;
    background: #fffdf9;
  }
  textarea { min-height: 96px; resize: vertical; }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  button {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 600;
  }
  .primary { background: var(--accent); color: white; }
  .secondary { background: #e9e2d3; color: var(--ink); }
  .danger { background: #fdebea; color: var(--danger); }
  .list {
    display: grid;
    gap: 12px;
  }
  .card {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .price {
    color: var(--accent);
    font-weight: 700;
  }
  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: #efe6d4;
    color: #6f5a2d;
    font-size: 12px;
  }
  .order-items {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .order-items div {
    margin-bottom: 6px;
    font-size: 14px;
  }
  .status {
    font-size: 13px;
    color: var(--muted);
  }
  @media (max-width: 960px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>KeerTea Admin Panel</h1>
        <p class="muted">Manage products, inventory, and incoming orders from one place.</p>
      </div>
      <a href="/">Back to storefront</a>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>Product Editor</h2>
        <p class="muted">Create a new product or load one from the list to update it.</p>

        <input type="hidden" id="productId">
        <label for="name">Name</label>
        <input id="name" type="text">

        <label for="category">Category</label>
        <input id="category" type="text">

        <label for="pricePerUnit">Price Per Unit</label>
        <input id="pricePerUnit" type="number" min="1" step="1">

        <label for="unit">Unit</label>
        <select id="unit">
          <option value="kg">kg</option>
          <option value="100g">100g</option>
        </select>

        <label for="minWeight">Minimum Weight (grams)</label>
        <input id="minWeight" type="number" min="1" step="1">

        <label for="maxWeight">Maximum Weight (grams)</label>
        <input id="maxWeight" type="number" min="1" step="1">

        <label for="inventoryGrams">Inventory (grams)</label>
        <input id="inventoryGrams" type="number" min="0" step="1">

        <label for="badge">Badge</label>
        <input id="badge" type="text">

        <label for="rating">Rating</label>
        <input id="rating" type="text" value="★★★★★">

        <label for="img">Image URL</label>
        <input id="img" type="url">

        <label for="desc">Description</label>
        <textarea id="desc"></textarea>

        <label for="isActive">Active on storefront</label>
        <select id="isActive">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>

        <div class="actions">
          <button class="primary" id="saveBtn">Save Product</button>
          <button class="secondary" id="resetBtn">Clear</button>
        </div>
      </section>

      <section class="panel">
        <h2>Products</h2>
        <div class="list" id="productsList"></div>

        <h2 style="margin-top:28px;">Orders</h2>
        <div class="list" id="ordersList"></div>
      </section>
    </div>
  </div>

<script>
  const formFields = [
    "productId", "name", "category", "pricePerUnit", "unit", "minWeight",
    "maxWeight", "inventoryGrams", "badge", "rating", "img", "desc", "isActive"
  ];

  function getField(id) {
    return document.getElementById(id);
  }

  function getPayload() {
    return {
      name: getField("name").value.trim(),
      category: getField("category").value.trim(),
      pricePerUnit: Number(getField("pricePerUnit").value),
      unit: getField("unit").value,
      minWeight: Number(getField("minWeight").value),
      maxWeight: Number(getField("maxWeight").value),
      inventoryGrams: Number(getField("inventoryGrams").value),
      badge: getField("badge").value.trim(),
      rating: getField("rating").value.trim(),
      img: getField("img").value.trim(),
      desc: getField("desc").value.trim(),
      isActive: getField("isActive").value === "true"
    };
  }

  function resetForm() {
    formFields.forEach((id) => getField(id).value = "");
    getField("unit").value = "kg";
    getField("rating").value = "★★★★★";
    getField("isActive").value = "true";
  }

  let adminProductsCache = [];

  function fillForm(product) {
    getField("productId").value = product.id;
    getField("name").value = product.name;
    getField("category").value = product.category;
    getField("pricePerUnit").value = product.pricePerUnit;
    getField("unit").value = product.unit;
    getField("minWeight").value = product.minWeight;
    getField("maxWeight").value = product.maxWeight;
    getField("inventoryGrams").value = product.inventoryGrams;
    getField("badge").value = product.badge;
    getField("rating").value = product.rating;
    getField("img").value = product.img;
    getField("desc").value = product.desc;
    getField("isActive").value = String(product.isActive);
  }

  async function fetchJson(url, options = {}) {
    const response = await fetch(url, {
      headers: { "Content-Type": "application/json" },
      ...options
    });
    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.error || "Request failed");
    }
    return data;
  }

  async function loadProducts() {
    const products = await fetchJson("/api/admin/products");
    adminProductsCache = products;
    const root = getField("productsList");
    root.innerHTML = products.map((product) => `
      <div class="card">
        <div class="card-top">
          <div>
            <h3>${product.name}</h3>
            <div class="muted">${product.category}</div>
          </div>
          <div class="price">Rs ${Math.round(product.pricePerUnit)}</div>
        </div>
        <p>${product.desc}</p>
        <div class="status">Inventory: ${product.inventoryGrams}g | Unit: ${product.unit} | Active: ${product.isActive ? "Yes" : "No"}</div>
        <div class="actions">
          <button class="secondary" onclick="editProduct(${product.id})">Edit</button>
          <button class="danger" onclick="removeProduct(${product.id})">Delete</button>
        </div>
      </div>
    `).join("");
  }

  async function loadOrders() {
    const orders = await fetchJson("/api/admin/orders");
    const root = getField("ordersList");
    if (!orders.length) {
      root.innerHTML = "<div class='card'><p class='muted'>No orders yet.</p></div>";
      return;
    }
    root.innerHTML = orders.map((order) => `
      <div class="card">
        <div class="card-top">
          <div>
            <h3>Order #${order.id}</h3>
            <div class="muted">${order.customerName} | ${order.phone}</div>
          </div>
          <span class="pill">${order.paymentStatus}</span>
        </div>
        <div class="status">Placed: ${new Date(order.createdAt).toLocaleString()}</div>
        <div class="status">Payment: ${order.paymentMethod} (${order.paymentProvider})</div>
        <div class="status">Address: ${order.address}</div>
        <div class="order-items">
          ${order.items.map((item) => `
            <div>${item.productName} - ${item.selectedWeight}g x ${item.quantity} = Rs ${Math.round(item.lineTotal)}</div>
          `).join("")}
        </div>
        <div class="price" style="margin-top:8px;">Total: Rs ${Math.round(order.total)}</div>
      </div>
    `).join("");
  }

  async function saveProduct() {
    const payload = getPayload();
    const productId = getField("productId").value;
    const method = productId ? "PUT" : "POST";
    const url = productId ? `/api/admin/products/${productId}` : "/api/admin/products";
    await fetchJson(url, { method, body: JSON.stringify(payload) });
    resetForm();
    await Promise.all([loadProducts(), loadOrders()]);
  }

  async function removeProduct(id) {
    await fetchJson(`/api/admin/products/${id}`, { method: "DELETE" });
    await loadProducts();
  }

  function editProduct(productId) {
    const product = adminProductsCache.find((entry) => entry.id === productId);
    if (!product) {
      return;
    }
    fillForm(product);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  document.getElementById("saveBtn").addEventListener("click", saveProduct);
  document.getElementById("resetBtn").addEventListener("click", resetForm);

  resetForm();
  Promise.all([loadProducts(), loadOrders()]).catch((error) => {
    alert(error.message);
  });
</script>
</body>
</html>
